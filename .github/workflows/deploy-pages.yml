name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Inject router basename for Pages build only
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = 'src/app/routes.tsx';
          const marker = 'basename: import.meta.env.BASE_URL';
          let text = fs.readFileSync(path, 'utf8');
          if (text.includes(marker)) {
            console.log('basename already present');
            process.exit(0);
          }
          const updated = text.replace(
            /createBrowserRouter\(([\s\S]*?)\);\s*$/m,
            'createBrowserRouter($1, { basename: import.meta.env.BASE_URL });\n'
          );
          if (updated === text) {
            throw new Error(`Could not inject basename into ${path}`);
          }
          fs.writeFileSync(path, updated);
          console.log(`Injected basename into ${path}`);
          EOF

      - name: Build site
        run: npx tsc --noEmit && npx vite build --base="/Codex-Provider-Documentation-Issues-Map/"

      - name: Prepare SPA fallback
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
